
    - name: Drain control-plane node
      shell: |
        kubectl drain {{ control_plane_node }} --ignore-daemonsets --delete-emptydir-data --force

    - name: Stop and remove the Docker container for the control-plane node
      shell: |
        docker stop {{ control_plane_node }} && docker rm {{ control_plane_node }}

    - name: Recreate the control-plane node with the latest Kind image
      shell: |
        docker run -d --name {{ control_plane_node }} \
          --privileged \
          --network kind \
          -v kind-prod:/var/lib/kubelet \
          -v kind-prod:/var/lib/containerd \
          {{ kind_node_image }}

    - name: Wait for control-plane node to be Ready
      shell: |
        kubectl wait --for=condition=Ready node/{{ control_plane_node }} --timeout=300s
      

  

