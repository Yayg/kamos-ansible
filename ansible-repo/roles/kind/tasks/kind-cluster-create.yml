- name: Check if the Kind cluster already exists
  shell: |
    /home/kind/.local/bin/kind get clusters | grep -w prod
  register: kind_cluster_exists
  failed_when: false
  changed_when: false

- name: Get the current Kubernetes version of the cluster
  shell: |
    kubectl version --short | grep "Server Version"
  register: current_k8s_version
  failed_when: false
  changed_when: false
  when: kind_cluster_exists.rc == 0

- name: Ensure /home/kind/.kind directory exists
  file:
    path: /home/kind/.kind
    state: directory
    mode: '0755'
    owner: kind
    group: kind

- name: Generate Kind cluster configuration
  copy:
    dest: /home/kind/.kind/config
    content: |
      kind: Cluster
      apiVersion: kind.x-k8s.io/v1alpha4
      nodes:
        - role: control-plane
        - role: control-plane
        - role: control-plane
        - role: worker
        - role: worker
        - role: worker
        - role: worker
        - role: worker
        - role: worker
      networking:
        disableDefaultCNI: true
        podSubnet: "10.244.0.0/16"
        serviceSubnet: "10.96.0.0/12"
      kubeadmConfigPatches:
        - |
          kind: ClusterConfiguration
          apiServer:
            extraArgs:
              "enable-admission-plugins": "NamespaceLifecycle,LimitRanger,ServiceAccount,DefaultStorageClass,ResourceQuota"
          scheduler:
            extraArgs:
              "leader-elect": "true"

# Update the Kind cluster if it exists
- name: Get the list of control-plane nodes
  shell: |
    /home/kind/.local/bin/kind get nodes --name prod | grep control-plane
  register: control_plane_nodes
  failed_when: false
  changed_when: false
  when: kind_cluster_exists.rc == 0

- name: Get the list of worker nodes
  shell: |
    /home/kind/.local/bin/kind get nodes --name prod | grep worker
  register: worker_nodes
  failed_when: false
  changed_when: false
  when: kind_cluster_exists.rc == 0

- name: Update control-plane nodes one by one
  shell: |
    /home/kind/.local/bin/kind delete node {{ item }} --name prod && \
    /home/kind/.local/bin/kind create node --name prod --config /home/kind/.kind/config
  loop: "{{ control_plane_nodes.stdout_lines }}"
  when: kind_cluster_exists.rc == 0

- name: Update worker nodes one by one
  shell: |
    /home/kind/.local/bin/kind delete node {{ item }} --name prod && \
    /home/kind/.local/bin/kind create node --name prod --config /home/kind/.kind/config
  loop: "{{ worker_nodes.stdout_lines }}"
  when: kind_cluster_exists.rc == 0

# Create the Kind cluster if it does not exist
- name: Create Kind cluster if it does not exist
  shell: |
    /home/kind/.local/bin/kind create cluster --name prod --config /home/kind/.kind/config
  when: kind_cluster_exists.rc != 0

# Generate kubeconfig for the Kind cluster
- name: Generate kubeconfig for the Kind cluster
  shell: |
    /home/kind/.local/bin/kind get kubeconfig --name prod > /home/kind/.kube/config
  args:
    creates: /home/kind/.kube/config

- name: Set KUBECONFIG environment variable
  shell: |
    export KUBECONFIG=/home/kind/.kube/config
  environment:
    KUBECONFIG: /home/kind/.kube/config