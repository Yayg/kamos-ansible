---
- name: Install dependencies
  apt:
    name:
      - curl
      - apt-transport-https
      - ca-certificates
      - software-properties-common
      - python3-pip
      - python3-requests
      - python3-kubernetes
    state: latest
    update_cache: yes

# Install kubectl
- name: Download the latest kubectl binary
  shell: |
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    chmod +x kubectl
    mv kubectl /usr/bin/kubectl

- name: Verify kubectl installation
  command: kubectl version --client

# Install Helm
- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | HELM_INSTALL_DIR=/usr/bin/ bash -s

# Create a user for Kubernetes
- name: Create kubernetes user
  user:
    name: "k8s"
    state: present
    shell: /bin/bash

- name: Install MicroK8s
  snap:
    name: microk8s
    classic: yes
    state: enabled

- name: Add user to microk8s group
  user:
    name: k8s
    groups: microk8s
    append: yes

- name: Enable MicroK8s addons
  shell: |
    microk8s enable {{ item }}
  loop: "{{ microk8s_addons }}"
  args:
    executable: /bin/bash

- name: Upgrade MicroK8s addons
  shell: |
    microk8s enable {{ item }}:upgrade
  loop: "{{ microk8s_addons }}"
  args:
    executable: /bin/bash

# Export MicroK8s kubeconfig to k8s user home
- import_tasks: microk8s-install.yml
  become: yes
  become_user: k8s
  become_method: sudo 
  become_flags: "-i"


# Post-installation tasks

## Install Cilium CNI
- import_tasks: cni.yml
  become: yes
  become_user: k8s
  become_method: sudo 
  become_flags: "-i"

## Install Vault
- import_tasks: app-base/cert-manager.yml
  become: yes
  become_user: k8s
  become_method: sudo 
  become_flags: "-i"

## Install Vault
- import_tasks: app-base/vault.yml
  become: yes
  become_user: k8s
  become_method: sudo 
  become_flags: "-i"