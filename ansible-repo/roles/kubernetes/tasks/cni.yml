  # Install Cilium
- name: Install Cilium CLI
  shell: |
    curl -L --remote-name-all https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz{,.sha256sum}
    sha256sum --check cilium-linux-amd64.tar.gz.sha256sum
    tar xzvf cilium-linux-amd64.tar.gz
    chmod +x cilium
    mkdir -p /home/k8s/.local/bin
    mv cilium /home/k8s/.local/bin/

- name: Check if Cilium is installed
  shell: |
    /home/k8s/.local/bin/cilium status
  register: cilium_status
  failed_when: false
  changed_when: false

- name: Install Cilium to the cluster
  shell: |
    /home/k8s/.local/bin/cilium install
  register: cilium_install
  when: cilium_status.rc != 0
  args:
    executable: /bin/bash

- name: Upgrade Cilium if already installed
  shell: |
    /home/k8s/.local/bin/cilium upgrade
  register: cilium_upgrade
  when: cilium_status.rc == 0
  args:
    executable: /bin/bash

- name: Wait for Cilium to be ready
  shell: |
    /home/k8s/.local/bin/cilium status --wait
  retries: 30
  delay: 10
  register: cilium_ready
  until: cilium_ready.rc == 0
  args:
    executable: /bin/bash