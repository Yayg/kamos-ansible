  # Install Cilium
- name: Install Cilium CLI
  shell: |
    curl -L --remote-name-all https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz{,.sha256sum}
    sha256sum --check cilium-linux-amd64.tar.gz.sha256sum
    tar xzvf cilium-linux-amd64.tar.gz
    chmod +x cilium
    mv cilium /home/kind/.local/bin/
  args:
    creates: /home/kind/.local/bin/cilium

- name: Check if Cilium is installed
  shell: |
    /home/kind/.local/bin/cilium status
  register: cilium_status
  failed_when: false
  changed_when: false

- name: Deploy or Update Cilium
  shell: |
    /home/kind/.local/bin/cilium install --restart-unmanaged
    /home/kind/.local/bin/cilium status --wait
  when: cilium_status.rc != 0 or cilium_status.stdout is search("needs update")
  environment:
    KUBECONFIG: /home/kind/.kube/config