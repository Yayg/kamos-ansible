# Install ArgoCD
- name: Create ArgoCD namespace
  shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Create ArgoCD ingress with cert-manager certificate
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: argocd-server
      namespace: argocd
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    spec:
      ingressClassName: traefik
      tls:
        - secretName: argocd-tls
          hosts:
            - argo.kamos.freeddns.org
      rules:
        - host: argo.kamos.freeddns.org
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: argocd-server
                    port:
                      number: 80
    EOF
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Wait for cert-manager to generate the certificate
  shell: |
    kubectl wait --for=condition=ready certificate argocd-tls -n argocd --timeout=300s || true
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Add ArgoCD Helm repository
  shell: |
    helm repo add argo https://argoproj.github.io/argo-helm
    helm repo update
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Install or Upgrade ArgoCD with existing TLS certificate
  community.kubernetes.helm:
    name: argocd
    chart_ref: argo/argo-cd
    namespace: argocd
    create_namespace: no
    state: present
    update_repo_cache: yes
    values:
      server:
        ingress:
          enabled: false
          tls: true
        extraArgs:
          - --insecure
      config:
        rbac:
          policy.default: role:admin
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Grant ArgoCD permissions to deploy in any namespace
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: argocd-cluster-admin
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
    - kind: ServiceAccount
      name: argocd-application-controller
      namespace: argocd
    EOF
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Create ArgoCD Application with recursive directory scanning
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: kamos-cluster-apps
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: 'https://github.com/Yayg/kamos-ansible.git'
        targetRevision: HEAD
        path: argocd
        directory:
          recurse: true
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /home/k8s/.kube/config
