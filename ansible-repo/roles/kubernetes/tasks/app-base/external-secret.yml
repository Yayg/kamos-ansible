--- 
- name: Enable cluster-secrets KV engine in Vault
  shell: |
    kubectl exec -n vault vault-0 -- vault login $(kubectl get secret vault-root-token -n vault -o jsonpath="{.data.token}" | base64 --decode)
    kubectl exec -n vault vault-0 -- vault secrets enable -path=cluster-secrets kv-v2
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Create Vault Policy file for External Secrets
  copy:
    dest: /tmp/external-secrets-policy.hcl
    content: |
      path "cluster-secrets/*" {
        capabilities = ["read"]
      }
      path "auth/token/create" {
        capabilities = ["create", "update"]
      }

- name: Copy Vault Policy file to vault-0 pod
  shell: |
    kubectl cp /tmp/external-secrets-policy.hcl vault/vault-0:/tmp/external-secrets-policy.hcl --kubeconfig /home/k8s/.kube/config
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Write Vault Policy for External Secrets
  shell: |
    kubectl exec -n vault vault-0 -- vault policy write external-secrets /tmp/external-secrets-policy.hcl
  environment:
    KUBECONFIG: /home/k8s/.kube/config

# Install External Secrets Operator
- name: Add External Secrets Helm repository
  shell: |
    helm repo add external-secrets https://charts.external-secrets.io
    helm repo update
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Install External Secrets Operator with Helm
  community.kubernetes.helm:
    name: external-secrets
    chart_ref: external-secrets/external-secrets
    namespace: external-secrets
    create_namespace: yes
    state: present
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Wait for External Secrets Operator to be ready
  shell: |
    kubectl wait --namespace external-secrets \
      --for=condition=available deployment \
      --timeout=600s external-secrets
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Create ClusterSecretStore for Vault
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: external-secrets.io/v1
    kind: ClusterSecretStore
    metadata:
      name: vault-secret-store
    spec:
      provider:
        vault:
          server: "http://vault.vault.svc.cluster.local:8200"
          path: "cluster-secrets/"
          version: "v2"
          auth:
            tokenSecretRef:
              name: vault-token
              key: token
    EOF
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Generate Vault Token for External Secrets
  shell: |
    VAULT_TOKEN=$(kubectl exec -n vault vault-0 -- vault token create -policy=external-secrets -ttl=24h -format=json | jq -r '.auth.client_token')
    kubectl create secret generic vault-token \
      --from-literal=token=$VAULT_TOKEN \
      --namespace default --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/k8s/.kube/config

- name: Create CronJob to Refresh Vault Token
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: refresh-vault-token
      namespace: default
    spec:
      schedule: "*/30 * * * *"
      jobTemplate:
        spec:
          template:
            spec:
              containers:
              - name: refresh-token
                image: hashicorp/vault:latest
                command:
                  - "/bin/sh"
                  - "-c"
                  - |
                    vault login $(kubectl get secret vault-token -n default -o jsonpath="{.data.token}" | base64 --decode)
                    vault token create -policy=external-secrets -ttl=24h | grep '^token ' | awk '{print $2}' > /tmp/new_token
                    kubectl create secret generic vault-token \
                      --from-file=token=/tmp/new_token \
                      --namespace default --dry-run=client -o yaml | kubectl apply -f -
                env:
                - name: VAULT_ADDR
                  value: "http://vault.vault.svc.cluster.local:8200"
                - name: KUBERNETES_SERVICE_HOST
                  value: "kubernetes.default.svc"
                - name: KUBERNETES_SERVICE_PORT
                  value: "443"
              restartPolicy: OnFailure
    EOF
  environment:
    KUBECONFIG: /home/k8s/.kube/config