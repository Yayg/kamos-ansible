# Install HashiCorp Vault in Kubernetes
- name: Add the HashiCorp Helm repository
  shell: |
    helm repo add hashicorp https://helm.releases.hashicorp.com
    helm repo update
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Install or Upgrade Vault using Helm
  shell: |
    helm upgrade --install vault hashicorp/vault \
      --namespace vault \
      --create-namespace \
      --set "server.dev.enabled=true" \
      --set "injector.enabled=false"
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Wait for Vault to be ready
  shell: |
    kubectl wait --namespace vault \
      --for=condition=available deployment \
      --timeout=600s vault
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Initialize Vault
  shell: |
    kubectl exec -n vault vault-0 -- vault operator init -key-shares=1 -key-threshold=1 -format=json > /tmp/vault-init.json
    VAULT_ROOT_TOKEN=$(jq -r ".root_token" /tmp/vault-init.json)
    kubectl create secret generic vault-root-token \
      --from-literal=token=$VAULT_ROOT_TOKEN \
      --namespace vault --dry-run=client -o yaml | kubectl apply -f -
  args:
    creates: /tmp/vault-init.json
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Unseal Vault
  shell: |
    VAULT_UNSEAL_KEY=$(jq -r ".unseal_keys_b64[0]" /tmp/vault-init.json)
    kubectl exec -n vault vault-0 -- vault operator unseal $VAULT_UNSEAL_KEY
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Enable Kubernetes Auth in Vault
  shell: |
    kubectl exec -n vault vault-0 -- vault login $(kubectl get secret vault-root-token -n vault -o jsonpath="{.data.token}" | base64 --decode)
    kubectl exec -n vault vault-0 -- vault auth enable kubernetes
    kubectl exec -n vault vault-0 -- vault write auth/kubernetes/config \
      token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      kubernetes_host="https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT" \
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Create Vault Policy for External Secrets
  shell: |
    kubectl exec -n vault vault-0 -- vault policy write external-secrets - <<EOF
    path "secret/*" {
      capabilities = ["read"]
    }
    EOF
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Create Vault Role for Kubernetes Auth
  shell: |
    kubectl exec -n vault vault-0 -- vault write auth/kubernetes/role/external-secrets \
      bound_service_account_names=external-secrets \
      bound_service_account_namespaces=external-secrets \
      policies=external-secrets \
      ttl=24h
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Create ClusterSecretStore for Vault
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: external-secrets.io/v1beta1
    kind: ClusterSecretStore
    metadata:
      name: vault-secret-store
    spec:
      provider:
        vault:
          server: "http://vault.vault.svc.cluster.local:8200"
          path: "secret/"
          version: "v2"
          auth:
            kubernetes:
              role: external-secrets
              serviceAccountRef:
                name: external-secrets
                namespace: external-secrets
    EOF
  environment:
    KUBECONFIG: /home/kind/.kube/config

# Install External Secrets Operator
- name: Install External Secrets Operator
  shell: |
    kubectl apply -f https://github.com/external-secrets/external-secrets/releases/latest/download/install-bundle.yaml
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Wait for External Secrets Operator to be ready
  shell: |
    kubectl wait --namespace external-secrets \
      --for=condition=available deployment \
      --timeout=600s external-secrets
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Create ClusterSecretStore for Vault
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: external-secrets.io/v1beta1
    kind: ClusterSecretStore
    metadata:
      name: vault-secret-store
    spec:
      provider:
        vault:
          server: "http://vault.default.svc.cluster.local:8200"
          path: "secret/"
          version: "v2"
          auth:
            tokenSecretRef:
              name: vault-token
              key: token
    EOF
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Create Vault Token Secret
  shell: |
    kubectl create secret generic vault-token \
      --from-literal=token=<your-vault-token> \
      --namespace default || true
  environment:
    KUBECONFIG: /home/kind/.kube/config

- name: Create CronJob to Refresh Vault Token
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: refresh-vault-token
      namespace default
    spec:
      schedule: "*/30 * * * *"
      jobTemplate:
        spec:
          template:
            spec:
              containers:
              - name: refresh-token
                image: hashicorp/vault:latest
                command:
                  - "/bin/sh"
                  - "-c"
                  - |
                    vault login -method=kubernetes role=my-role > /tmp/token && \
                    kubectl create secret generic vault-token \
                      --from-file=token=/tmp/token \
                      --namespace default --dry-run=client -o yaml | kubectl apply -f -
                env:
                - name: VAULT_ADDR
                  value: "http://vault.default.svc.cluster.local:8200"
                - name: KUBERNETES_SERVICE_HOST
                  value: "kubernetes.default.svc"
                - name: KUBERNETES_SERVICE_PORT
                  value: "443"
              restartPolicy: OnFailure
    EOF
  environment:
    KUBECONFIG: /home/kind/.kube/config