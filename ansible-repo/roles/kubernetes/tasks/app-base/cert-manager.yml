---
- name: Ensure cert-manager namespace exists
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: cert-manager
    state: present

- name: Add Jetstack Helm repo
  shell: |
    helm repo add jetstack https://charts.jetstack.io || true
  args:
    executable: /bin/bash

- name: Update Helm repos
  shell: |
    helm repo update
  args:
    executable: /bin/bash

- name: Check if cert-manager is installed
  shell: |
    helm status cert-manager -n cert-manager
  register: certmgr_status
  failed_when: false
  changed_when: false

- name: Install cert-manager via Helm
  shell: |
    helm install cert-manager jetstack/cert-manager \
      --namespace cert-manager \
      --create-namespace \
      --set installCRDs=true \
      --version {{ cert_manager_version | default('v1.14.0') }}
  args:
    executable: /bin/bash
  when: certmgr_status.rc != 0

- name: Upgrade cert-manager via Helm
  shell: |
    helm upgrade cert-manager jetstack/cert-manager \
      --namespace cert-manager \
      --set installCRDs=true \
      --version {{ cert_manager_version | default('v1.14.0') }}
  args:
    executable: /bin/bash
  when: certmgr_status.rc == 0

- name: Wait for cert-manager deployments to be ready
  shell: |
    kubectl -n cert-manager wait --for=condition=available --timeout=300s deployment --all
  retries: 30
  delay: 10
  register: certmgr_ready
  until: certmgr_ready.rc == 0
  args:
    executable: /bin/bash

- name: Create ClusterIssuer for Let's Encrypt (Staging)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-staging
      spec:
        acme:
          server: https://acme-staging-v02.api.letsencrypt.org/directory
          email: me@raf.sh
          privateKeySecretRef:
            name: letsencrypt-staging
          solvers:
            - http01:
                ingress:
                  class: traefik

- name: Create ClusterIssuer for Let's Encrypt (Production)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      spec:
        acme:
          server: https://acme-v02.api.letsencrypt.org/directory
          email: me@raf.sh
          privateKeySecretRef:
            name: letsencrypt-prod
          solvers:
            - http01:
                ingress:
                  class: traefik
