apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docteur-ericgozlan
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Yayg/kamos-ansible.git'
    targetRevision: HEAD
    path: argocd/docteur-ericgozlan
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: docteur-ericgozlan
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
