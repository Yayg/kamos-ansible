apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-kubernetes-2
  namespace: hello-kubernetes-2
  labels:
    app: hello-kubernetes-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-kubernetes-2
  template:
    metadata:
      labels:
        app: hello-kubernetes-2
    spec:
      containers:
      - name: hello-kubernetes-2
        image: paulbouwer/hello-kubernetes:1.10
        ports:
        - containerPort: 8080
        env:
        - name: MESSAGE
          value: "Hello from Kubernetes 2!"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-kubernetes-2
  namespace: hello-kubernetes-2
  labels:
    app: hello-kubernetes-2
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: hello-kubernetes-2
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-kubernetes-2
  namespace: hello-kubernetes-2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: hello-kubernetes-2-tls
      hosts:
        - hello2.kamos.freeddns.org
  rules:
  - host: hello2.kamos.freeddns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello-kubernetes-2
            port:
              number: 80
